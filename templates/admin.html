<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão | Boutique Elegance</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--primary);
            padding-bottom: 50px;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 16px;
        }

        .admin-card {
            background: white;
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 24px;
        }

        .admin-card h2 {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        @media (min-width: 600px) {
            .form-grid { grid-template-columns: 1fr 1fr; }
            .full-width { grid-column: span 2; }
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        input, select, textarea {
            width: 100%;
            padding: 11px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #f8fafc;
            font-size: 13px;
            outline: none;
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        /* Lista de Produtos Cadastrados */
        .product-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 10px;
            background: white;
        }

        .product-list-item img {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
        }

        .btn-delete {
            background: #fee2e2;
            color: var(--danger);
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1 style="font-size: 18px; font-weight: 800;">Painel de Gestão</h1>
        <p style="font-size: 11px; opacity: 0.8;">Boutique Elegance</p>
    </div>
    <a href="/" style="color: white; text-decoration: none; font-size: 13px; font-weight: 700;">
        <i class="fa-solid fa-store"></i> Ver Loja
    </a>
</header>

<div class="container">
    
    <!-- Formulário para Adicionar Produto -->
    <div class="admin-card">
        <h2><i class="fa-solid fa-plus-circle" style="color: var(--accent);"></i> Adicionar Novo Produto</h2>
        
        <form action="/admin/add" method="POST">
            <div class="form-grid">
                <div class="full-width">
                    <label>Nome da Peça</label>
                    <input type="text" name="nome" placeholder="Ex: Vestido Floral de Verão" required>
                </div>

                <div>
                    <label>Categoria</label>
                    <input type="text" name="categoria" placeholder="Ex: Vestidos, Blusas, Calçados" required>
                </div>

                <div>
                    <label>Preço (MT)</label>
                    <input type="number" step="0.01" name="preco" placeholder="Ex: 2500" required>
                </div>

                <div>
                    <label>Tamanhos (separados por vírgula)</label>
                    <input type="text" name="tamanhos" placeholder="Ex: S, M, L, XL">
                </div>

                <div>
                    <label>Cores (separadas por vírgula)</label>
                    <input type="text" name="cores" placeholder="Ex: Preto, Vermelho, Branco">
                </div>

                <div class="full-width">
                    <label>URL da Foto do Produto</label>
                    <input type="url" name="fotos" placeholder="https://exemplo.com/imagem.jpg" required>
                </div>

                <div class="full-width">
                    <label>Descrição Curta</label>
                    <textarea name="descricao" rows="2" placeholder="Descreva o tecido, caimento..."></textarea>
                </div>
            </div>

            <button type="submit" class="btn-submit">Cadastrar Produto</button>
        </form>
    </div>

    <!-- Lista de Produtos para Gestão -->
    <div class="admin-card">
        <h2><i class="fa-solid fa-boxes-stacked"></i> Catálogo Actual ({{ produtos | length }})</h2>

        {% for p in produtos %}
        <div class="product-list-item">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="{{ p.fotos.split(',')[0] if p.fotos else 'https://via.placeholder.com/100' }}" alt="">
                <div>
                    <h4 style="font-size: 13px; font-weight: 800;">{{ p.nome }}</h4>
                    <p style="font-size: 11px; color: #64748b;">{{ p.categoria }} • <b>{{ p.preco }} MT</b></p>
                </div>
            </div>

            <form action="/admin/delete/{{ p.id }}" method="POST" onsubmit="return confirm('Tem certeza que deseja eliminar este produto?');">
                <button type="submit" class="btn-delete" title="Eliminar"><i class="fa-solid fa-trash"></i></button>
            </form>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
