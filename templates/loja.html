<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ config.NOME_LOJA }} | Catálogo Digital</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="{{ config.COR_SECUNDARIA }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Fontes e Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS Próprio -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-whatsapp="{{ config.NUMERO_WHATSAPP }}">

    <!-- Banner Indicador de Estado Offline -->
    <div id="offline-banner" class="status-offline">
        <i class="fa-solid fa-wifi"></i> Modo Offline - A navegar no catálogo guardado
    </div>

    <!-- Cabeçalho Principal -->
    <header>
        <div class="brand">
            <h1>{{ config.NOME_LOJA }}</h1>
        </div>
        <button id="btn-install" class="btn-cat" style="display:none;">
            <i class="fa-solid fa-download"></i> Instalar App
        </button>
    </header>

    <!-- Carrossel Horizontal de Categorias -->
    <div class="categories-container">
        <button class="btn-cat active" onclick="filtrar('todas')">Todas</button>
        {% for cat in categorias %}
        <button class="btn-cat" onclick="filtrar('{{ cat }}')">{{ cat }}</button>
        {% endfor %}
    </div>

    <!-- Grelha de Produtos Responsiva -->
    <main class="products-grid">
        {% for p in produtos %}
        <div class="product-card" data-categoria="{{ p.categoria }}">
            <img src="{{ p.fotos.split(',')[0] if p.fotos else '/static/images/placeholder.jpg' }}" class="product-img" alt="{{ p.nome }}" loading="lazy">
            <div class="product-info">
                <div>
                    <div class="product-title">{{ p.nome }}</div>
                    <div class="product-price">{{ p.preco }} MT</div>
                </div>
                <button class="btn-add" onclick="abrirModalVariacoes('{{ p.id }}', '{{ p.nome }}', '{{ p.preco }}', '{{ p.tamanhos }}', '{{ p.cores }}')">
                    <i class="fa-solid fa-cart-plus"></i> Escolher
                </button>
            </div>
        </div>
        {% else %}
        <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">
            <i class="fa-solid fa-box-open" style="font-size: 3rem; margin-bottom: 10px;"></i>
            <p>Nenhum produto disponível no catálogo neste momento.</p>
        </div>
        {% endfor %}
    </main>

    <!-- Barra Flutuante do Carrinho de Compras -->
    <div class="cart-float" id="cart-bar" onclick="abrirCarrinho()">
        <span><i class="fa-solid fa-bag-shopping"></i> <span id="cart-count">0</span> itens</span>
        <span id="cart-total">0.00 MT</span>
    </div>

    <!-- JavaScript Principal da App -->
    <script src="/static/js/app.js"></script>

    <!-- Script de Inicialização da PWA (Offline & Instalação) -->
    <script>
        // Registo do Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker Registado com Sucesso!'))
                    .catch(err => console.log('Erro ao registar Service Worker:', err));
            });
        }

        // Monitor de Estado Online / Offline
        window.addEventListener('online', atualizarEstadoRede);
        window.addEventListener('offline', atualizarEstadoRede);

        function atualizarEstadoRede() {
            const banner = document.getElementById('offline-banner');
            if (banner) {
                banner.style.display = navigator.onLine ? 'none' : 'block';
            }
        }
        atualizarEstadoRede();

        // Banner de Instalação no Telemóvel
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const btnInstall = document.getElementById('btn-install');
            if (btnInstall) btnInstall.style.display = 'block';
        });

        const btnInstall = document.getElementById('btn-install');
        if (btnInstall) {
            btnInstall.addEventListener('click', () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choice) => {
                        if (choice.outcome === 'accepted') {
                            btnInstall.style.display = 'none';
                        }
                        deferredPrompt = null;
                    });
                }
            });
        }
    </script>
</body>
</html>
